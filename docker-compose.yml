services:
  curl-proxy:
    build: .
    container_name: curl-proxy
    ports:
      - "5555:5555"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "python3", "-c", "import urllib.request; urllib.request.urlopen('http://localhost:5555/health')"]
      interval: 30s
      timeout: 5s
      retries: 3
